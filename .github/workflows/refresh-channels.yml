name: Refresh channels cron

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh channels
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "SITE_URL secret not set. Skipping."
            exit 1
          fi
          if [ -z "$ADMIN_API_KEY" ]; then
            echo "ADMIN_API_KEY secret not set. Skipping."
            exit 1
          fi
          status=$(curl -s -o /dev/null -w "%{http_code}" -H "x-api-key: $ADMIN_API_KEY" "$SITE_URL/api/admin/refresh-channels")
          echo "Refresh response: $status"
